name: PR Validation

on:
  pull_request:
    branches:
      - develop

jobs:
  lint:
    name: Lint HTML and CSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint HTML with HTMLHint
        run: npx htmlhint "**/*.html"

      - name: Lint CSS with Stylelint
        run: npx stylelint "**/*.css"

  build:
    name: Build Website
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build with Parcel
        run: npx parcel build src/index.html
